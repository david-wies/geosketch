version: 2
updates:
  # Python runtime + dev dependencies (requirements*.txt at repo root).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Bundle bumps into one PR per group so the PR limit isn't eaten by
    # individual version bumps.
    groups:
      python-runtime:
        patterns:
          - "numpy"
          - "matplotlib"
          - "shapely"
          - "scipy"
      python-dev:
        patterns:
          - "ruff"
          - "pylint"
          - "pytest"
          - "flake8"

  # GitHub Actions — keeps the SHA-pinned action refs current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"

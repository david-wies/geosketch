name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: lint + test only need to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a fast follow-up push doesn't
# leave a stale runner busy (or a stale-green required check) behind.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Lint (pylint)
        run: pylint $(git ls-files '*.py')

      - name: Test (pytest)
        run: pytest --tb=short || { code=$?; [ $code -eq 5 ] && echo "No tests collected." || exit $code; }

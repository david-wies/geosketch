[project]
name = "geosketch"
version = "0.1.0"
requires-python = ">=3.14"
license = "Apache-2.0"
dependencies = [
    "numpy>=2.0",
    "matplotlib>=3.8",
    "shapely>=2.0",
    "scipy>=1.13",
]

[project.scripts]
geosketch = "geometry.__main__:main"

[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = [".claude", ".github", "spec"]

[tool.pylint.main]
ignore-paths = ["spec", ".claude", ".github", ".venv"]

[tool.pylint.messages_control]
disable = ["C0114", "C0115", "C0116"]

[tool.pylint.design]
max-args = 8

[tool.pylint.format]
max-line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
